<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Caveat:wght@600;700&amp;family=Space+Mono:wght@400;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&amp;display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family:'DM Sans',sans-serif; color:#2E2A24; background:#F4EFE3; -webkit-font-smoothing:antialiased; }
  ::selection { background:#0E8C9C; color:#fff; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .jp { position:absolute; inset:0; overflow:hidden; background:#f1ebdd; backface-visibility:hidden; -webkit-backface-visibility:hidden; background-image:repeating-linear-gradient(transparent,transparent 33px,rgba(46,42,36,0.05) 34px); }
  .ph { display:flex; align-items:center; justify-content:center; width:100%; height:100%; background-image:repeating-linear-gradient(45deg,#e7ddca,#e7ddca 7px,#ddd2bb 7px,#ddd2bb 14px); }
  .ph span { font-family:'Space Mono',monospace; font-size:12px; color:#8a8170; letter-spacing:1px; text-align:center; padding:4px; }
  .pgimg { display:block; width:100%; height:100%; object-fit:cover; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; animation:none !important; } }
  @media (max-width:1080px){
    [data-drag]{ display:none !important; }
    #book{ max-width:none !important; }
    #book-stage{ width:920px !important; left:50%; transform:translateX(-50%) scale(0.72); transform-origin:top center; margin-bottom:-185px; }
  }
  @media (max-width:680px){
    #book-stage{ transform:translateX(-50%) scale(0.46); margin-bottom:-356px; }
  }
  @media (max-width:430px){
    #book-stage{ transform:translateX(-50%) scale(0.34); margin-bottom:-435px; }
  }
</style>
<script src="./image.js"></script>
</helmet>

<div style="position:relative; min-height:100vh; background-color:#F4EFE3; background-image:radial-gradient(rgba(46,42,36,0.11) 1.1px, transparent 1.2px); background-size:26px 26px; overflow-x:clip;">

  <!-- HEADER -->
  <header id="site-header" style="position:sticky; top:0; z-index:300; padding:16px 28px 0; transition:padding .35s cubic-bezier(0.16,1,0.3,1);">
    <div id="header-card" style="max-width:1180px; margin:0 auto; padding:13px 30px; display:flex; align-items:center; justify-content:space-between; background:rgba(248,244,236,0.9); backdrop-filter:blur(10px); border:1px solid rgba(46,42,36,0.12); border-radius:16px; box-shadow:0 10px 30px -18px rgba(46,42,36,0.35); transition:padding .35s cubic-bezier(0.16,1,0.3,1), box-shadow .35s ease;">
      <a href="index.html" id="hj-logo" style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:30px; letter-spacing:-1px; color:#0E8C9C; text-decoration:none;">HJ</a>

  <!-- BOOK STAGE -->
  <section style="max-width:1180px; margin:0 auto; padding:18px 28px 70px; position:relative;">

    </div>
    <div data-drag="" style="position:absolute; top:138px; left:148px; z-index:5; cursor:grab; transform:rotate(5deg);">

            <div style="position:absolute; inset:0; border:2px dashed rgba(255,255,255,0.12); border-radius:6px 14px 14px 6px; margin:16px;"></div>

              <div style="position:absolute; inset:8px; border:1.5px solid rgba(94,74,38,0.5); border-radius:46% 46% 44% 44%/28%;"></div>
              <div style="font-family:'Architects Daughter',cursive; font-size:34px; color:#46402f;">Himanshi's<br>journal</div>
            </div>
            <div style="position:absolute; bottom:70px; left:0; right:0; text-align:center; font-family:'Architects Daughter',cursive; font-size:22px; color:#c9b27e;">2002 — current</div>
          </div>
          <!-- BACK: About me (left page of spread A) -->
          <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); overflow:hidden; border-radius:14px 6px 6px 14px;">
            <img class="pgimg" src="./1-mqo1wz4o.jpg" alt="Himanshi in progress">
          </div>
        </div>

        <!-- LEAF 1 : spread A right / spread B left -->
        <div style="position:absolute; right:0; top:0; width:460px; height:640px; transform-origin:left center; transform-style:preserve-3d; transition:transform .9s cubic-bezier(0.2,0.8,0.25,1); transform:{{ l1t }}; z-index:{{ l1z }};">
          <!-- FRONT: doctor -> design (right page of spread A) -->
          <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:6px 14px 14px 6px;">
            <img class="pgimg" src="./2-mqo1xaid.jpg" alt="Roots and memories" style="border-radius:6px 14px 14px 6px;">
          </div>
          <!-- BACK: creating / hobbies (left page of spread B) -->
          <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); overflow:hidden; border-radius:14px 6px 6px 14px;">

          </div>
        </div>

        <!-- LEAF 2 : spread B right / closing left -->
        <div style="position:absolute; right:0; top:0; width:460px; height:640px; transform-origin:left center; transform-style:preserve-3d; transition:transform .9s cubic-bezier(0.2,0.8,0.25,1); transform:{{ l2t }}; z-index:{{ l2z }};">
          <!-- FRONT: ocean (right page of spread B) -->
          <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:6px 14px 14px 6px;">
            <img class="pgimg" src="./chatgpt-image-jun-21-2026-10_54_46-pm-mqo24c0o.png" alt="Little things" style="border-radius:6px 14px 14px 6px;">
          </div>
          <!-- BACK: closing left (thank you) -->
          <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); overflow:hidden; border-radius:14px 6px 6px 14px;">
            <img class="pgimg" src="./chatgpt-image-jun-21-2026-05_28_17-pm-mqo230kz.png" alt="To future" style="border-radius:14px 6px 6px 14px;">
          </div>
        </div>

        <!-- LEAF 3 : closing right / back cover -->
        <div style="position:absolute; right:0; top:0; width:460px; height:640px; transform-origin:left center; transform-style:preserve-3d; transition:transform .9s cubic-bezier(0.2,0.8,0.25,1); transform:{{ l3t }}; z-index:{{ l3z }};">
          <!-- FRONT: closing right (draggable note) -->
          <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:6px 14px 14px 6px;">
            <img class="pgimg" src="./chatgpt-image-jun-21-2026-05_31_59-pm-mqo22k8x.png" alt="Me, in all my chapters" style="border-radius:6px 14px 14px 6px;">
          </div>
          <!-- BACK: back cover -->
          <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); overflow:hidden; border-radius:14px 6px 6px 14px; background:linear-gradient(135deg,#4c463f,#2c2823); box-shadow:inset 0 0 60px rgba(0,0,0,0.4);">
            <div style="position:absolute; inset:16px; border:2px dashed rgba(255,255,255,0.12); border-radius:6px;"></div>
            <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Architects Daughter',cursive; font-size:24px; color:#c9b27e;">— the end —</div>
          </div>
        </div>

      </div>

      <!-- NAV BUTTONS -->
      <button onClick="{{ prev }}" aria-label="Previous page" style="position:absolute; left:-4px; top:300px; z-index:200; width:54px; height:54px; border-radius:50%; border:none; background:#fff; color:#2E2A24; font-size:22px; cursor:pointer; box-shadow:0 10px 22px -8px rgba(46,42,36,0.4); display:{{ prevDisplay }}; align-items:center; justify-content:center; opacity:{{ prevOpacity }}; transition:transform .3s cubic-bezier(0.34,1.56,0.64,1), opacity .3s ease;" style-hover="transform:scale(1.12);">‹</button>
      <button onClick="{{ next }}" aria-label="Next page" style="position:absolute; right:-4px; top:300px; z-index:200; width:54px; height:54px; border-radius:50%; border:none; background:#fff; color:#2E2A24; font-size:22px; cursor:pointer; box-shadow:0 10px 22px -8px rgba(46,42,36,0.4); display:{{ nextDisplay }}; align-items:center; justify-content:center; opacity:{{ nextOpacity }}; transition:transform .3s cubic-bezier(0.34,1.56,0.64,1), opacity .3s ease;" style-hover="transform:scale(1.12);">›</button>
    </div>
  </section>

  <!-- FOOTER -->
  <footer style="background:#2b2620; padding:64px 28px 40px; position:relative; margin-top:10px;">
    <div style="max-width:1180px; margin:0 auto; text-align:center;">
      <div style="font-family:'Architects Daughter',cursive; font-size:32px; color:#0E8C9C;">&amp; that's a wrap!</div>
      <h2 style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:44px; letter-spacing:-1px; color:#F4EFE3; margin:6px 0 36px;">GLAD YOU MADE IT HERE.</h2>
      <div style="font-family:'Architects Daughter',cursive; font-size:26px; color:#b7ad9c; margin-bottom:18px;">You can connect with me on,</div>
      <div style="display:flex; flex-wrap:wrap; gap:14px 30px; justify-content:center; align-items:center; margin-bottom:50px;">
        <sc-for list="{{ socials }}" as="s" hint-placeholder-count="4">
          <a href="{{ s.url }}" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:6px; font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:1px; font-size:22px; color:{{ s.color }}; text-decoration:none; transition:transform .3s cubic-bezier(0.34,1.56,0.64,1);" style-hover="transform:translateY(-4px);">{{ s.label }} ↗</a>
        </sc-for>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:20px; align-items:center; justify-content:space-between; border-top:1px solid rgba(244,239,227,0.14); padding-top:24px;">
        <div style="font-family:'Architects Daughter',cursive; font-size:24px; color:#b7ad9c; display:flex; align-items:center; gap:10px;">Built with care and a lot of passion! <span style="color:#0E8C9C;">❤</span></div>
        <div style="font-family:'DM Sans',sans-serif; font-variant-numeric:tabular-nums; font-size:15px; color:#8a8170; letter-spacing:1px;">{{ clockTime }} &nbsp;|&nbsp; {{ dateLong }}</div>
      </div>
    </div>
  </footer>

  <button id="go-top" onClick="{{ scrollTop }}" aria-label="Back to top" style="position:fixed; right:26px; bottom:26px; z-index:60; width:108px; height:108px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transform:translateY(14px); pointer-events:none; transition:opacity .4s ease, transform .4s cubic-bezier(0.34,1.56,0.64,1);" style-hover="transform:translateY(-4px);">
    <svg viewBox="0 0 108 108" width="108" height="108" style="position:absolute; inset:0; animation:spin 11s linear infinite;">
      <defs><path id="gtt-path" d="M54,54 m-40,0 a40,40 0 1,1 80,0 a40,40 0 1,1 -80,0"></path></defs>
      <text fill="#2E2A24" style="font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:700; letter-spacing:3.5px;"><textPath href="#gtt-path" startOffset="0">GO TO TOP&nbsp;&nbsp;◆&nbsp;&nbsp;GO TO TOP&nbsp;&nbsp;◆&nbsp;&nbsp;</textPath></text>
    </svg>
    <span style="position:absolute; width:66px; height:66px; border:1.6px dashed rgba(46,42,36,0.55); border-radius:50%;"></span>
    <span style="position:relative; color:#0E8C9C; font-size:30px; line-height:1; font-weight:700;">↑</span>
  </button>

</div>

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { now: new Date(), flipped: 0 };
  TOTAL = 4;

  componentDidMount() {
    this._reduced = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    this._tick = setInterval(() => this.setState({ now: new Date() }), 1000);
    setTimeout(() => { this.initHeader(); this.initDrag(); }, 30);
    window.addEventListener('keydown', this.onKey);
  }
  componentWillUnmount() { clearInterval(this._tick); window.removeEventListener('keydown', this.onKey); }

  pad(n) { return (n < 10 ? '0' : '') + n; }
  onKey = (e) => { if (e.key === 'ArrowRight') this.next(); else if (e.key === 'ArrowLeft') this.prev(); };
  next = () => this.setState((s) => ({ flipped: Math.min(this.TOTAL, s.flipped + 1) }));
  prev = () => this.setState((s) => ({ flipped: Math.max(0, s.flipped - 1) }));
  goTo = (i) => this.setState({ flipped: i });
  scrollTop = () => window.scrollTo({ top: 0, behavior: this._reduced ? 'auto' : 'smooth' });

  initHeader() {
    const h = document.getElementById('site-header');
    const logo = document.getElementById('hj-logo');
    if (!h) return;
    const onScroll = () => {
      const s = window.scrollY > 40;
      h.style.paddingTop = s ? '10px' : '16px';
      const card = document.getElementById('header-card');
      if (card) {
        card.style.paddingTop = s ? '9px' : '13px';
        card.style.paddingBottom = s ? '9px' : '13px';
        card.style.boxShadow = s ? '0 16px 36px -16px rgba(46,42,36,0.45)' : '0 10px 30px -18px rgba(46,42,36,0.35)';
      }
      if (logo) logo.style.fontSize = s ? '25px' : '28px';
      const gt = document.getElementById('go-top');
      if (gt) {
        const show = window.scrollY > 320;
        gt.style.opacity = show ? '1' : '0';
        gt.style.transform = show ? 'translateY(0)' : 'translateY(14px)';
        gt.style.pointerEvents = show ? 'auto' : 'none';
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  initDrag() {
    const items = [].slice.call(document.querySelectorAll('[data-drag]'));
    items.forEach((el) => {
      let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
      const pt = (e) => { const t = e.touches && e.touches[0] ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; };
      const down = (e) => { dragging = true; const p = pt(e); sx = p.x; sy = p.y; el.style.cursor = 'grabbing'; el.style.zIndex = 30; if (e.cancelable) e.preventDefault(); };
      const move = (e) => { if (!dragging) return; const p = pt(e); el.style.transform = 'translate(' + (ox + p.x - sx) + 'px,' + (oy + p.y - sy) + 'px)'; if (e.cancelable) e.preventDefault(); };
      const up = (e) => { if (!dragging) return; dragging = false; const p = pt(e); ox += (p.x - sx); oy += (p.y - sy); el.style.cursor = 'grab'; };
      el.addEventListener('mousedown', down);
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
      el.addEventListener('touchstart', down, { passive: false });
      window.addEventListener('touchmove', move, { passive: false });
      window.addEventListener('touchend', up);
    });
  }

  renderVals() {
    const main = 'index.html';
    const nav = [
      { label: 'Work', href: 'work.html', line: '0%' },
      { label: 'About', href: 'about.html', line: '100%' },
      { label: 'Resume', href: 'resume.html', line: '0%' },
      { label: 'Contact', href: 'contact.html', line: '0%' }
    ];

    const f = this.state.flipped;
    const N = this.TOTAL;
    const leaf = (i) => ({
      t: 'perspective(2400px) rotateY(' + (i < f ? -180 : 0) + 'deg)',
      z: i < f ? 100 + i : 100 + (N - i)
    });
    const L = [leaf(0), leaf(1), leaf(2), leaf(3)];

    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const n = this.state.now;
    const clockTime = this.pad(n.getHours()) + ':' + this.pad(n.getMinutes()) + ':' + this.pad(n.getSeconds());
    const dateLong = days[n.getDay()] + ', ' + months[n.getMonth()] + ' ' + n.getDate() + ', ' + n.getFullYear();
    const socials = [
      { label: 'LINKEDIN', url: 'https://www.linkedin.com/in/himanshijain', color: '#5b86e6' },
      { label: 'INSTAGRAM', url: 'https://www.instagram.com/himanshijain', color: '#D6336C' },
      { label: 'BEHANCE', url: 'https://www.behance.net/himanshijain', color: '#3B6FE0' },
      { label: 'WHATSAPP', url: 'https://wa.me/917014744297', color: '#62C554' }
    ];

    return {
      nav, socials, clockTime, dateLong,
      l0t: L[0].t, l0z: L[0].z, l1t: L[1].t, l1z: L[1].z, l2t: L[2].t, l2z: L[2].z, l3t: L[3].t, l3z: L[3].z,
      flipNoteOpacity: f === 0 ? 1 : 0,
      prevDisplay: f === 0 ? 'none' : 'flex',
      prevOpacity: f === 0 ? 0 : 1,
      nextDisplay: f === N ? 'none' : 'flex',
      nextOpacity: f === N ? 0 : 1,
      prev: this.prev, next: this.next, scrollTop: this.scrollTop
    };
  }
}
</script>
</body>
