document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

necap=%22round%22 stroke-linejoin=%22round%22&gt;&lt;path d=%22M6 9l6 6 6-6%22/&gt;&lt;/svg&gt;'); background-repeat:no-repeat; background-position:right 18px center; transition:border-color .25s ease, box-shadow .25s ease;\" style-focus=\"border-color:#0E8C9C; box-shadow:0 0 0 3px rgba(14,140,156,0.12);\">\n                <sc-for list=\"{{ topics }}\" as=\"t\" hint-placeholder-count=\"5\">\n                  <option value=\"{{ t.value }}\">{{ t.label }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"margin-bottom:30px;\">\n              <label for=\"c-msg\" style=\"display:block; font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:1px; font-size:15px; color:#0E8C9C; margin-bottom:12px;\">MESSAGE<\u002Flabel>\n              <textarea id=\"c-msg\" rows=\"4\" placeholder=\"Tell me a little about the project...\" style=\"width:100%; box-sizing:border-box; padding:18px 20px; font-family:'DM Sans',sans-serif; font-size:19px; color:#2E2A24; background:#f7f3ea; border:1px solid rgba(46,42,36,0.18); border-radius:4px; outline:none; resize:vertical; transition:border-color .25s ease, box-shadow .25s ease;\" style-focus=\"border-color:#0E8C9C; box-shadow:0 0 0 3px rgba(14,140,156,0.12);\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:flex-end;\">\n              <button onclick=\"{{ sendMessage }}\" style=\"display:inline-flex; align-items:center; gap:14px; padding:18px 34px; background:#0E8C9C; color:#fff; border:none; cursor:pointer; font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:1px; font-size:18px; border-radius:4px; box-shadow:6px 8px 0 0 rgba(46,42,36,0.16); transition:transform .3s cubic-bezier(0.34,1.56,0.64,1), box-shadow .3s ease;\" style-hover=\"transform:translate(-2px,-2px); box-shadow:9px 12px 0 0 rgba(46,42,36,0.18);\">SEND MESSAGE <span style=\"font-size:20px;\">↗<\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT RAIL -->\n      <div style=\"flex:1 1 360px; min-width:300px; display:flex; flex-direction:column; gap:28px;\">\n        <!-- dark email card -->\n        <div style=\"position:relative; background:#2b2620; border-radius:16px; padding:40px 38px 38px; overflow:hidden; box-shadow:0 24px 50px -24px rgba(43,38,32,0.6);\">\n          <div style=\"position:absolute; top:-40px; right:-40px; width:220px; height:220px; background:radial-gradient(circle, rgba(14,140,156,0.45), rgba(59,111,224,0.18) 55%, transparent 72%); filter:blur(6px);\"><\u002Fdiv>\n          <div style=\"position:relative;\">\n            <div style=\"font-family:'Architects Daughter',cursive; font-size:30px; color:#0E8C9C;\">Prefer email ?<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:40px; letter-spacing:-1px; color:#F4EFE3; margin-top:4px;\">SHOOT IT <span style=\"font-family:'Architects Daughter',cursive; font-weight:400; color:#0E8C9C;\">Directly.<\u002Fspan><\u002Fdiv>\n            <p style=\"font-family:'DM Sans',sans-serif; font-size:18px; line-height:1.5; color:#b7ad9c; margin:18px 0 28px; max-width:340px;\">Share a brief overview of your requirements, and I'll respond at the earliest.<\u002Fp>\n            <a href=\"mailto:himanshijain053@gmail.com\" style=\"display:flex; align-items:center; gap:18px; padding:18px 22px; border:1px solid rgba(244,239,227,0.22); border-radius:6px; text-decoration:none; transition:background .25s ease, transform .3s cubic-bezier(0.34,1.56,0.64,1);\" style-hover=\"background:rgba(244,239,227,0.06); transform:translateY(-3px);\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#b7ad9c\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"m3 7 9 6 9-6\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:20px; color:#F4EFE3;\">himanshijain053@gmail.com<\u002Fspan>\n            <\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- status card -->\n        <div style=\"background:#efe9dc; border:1px solid rgba(46,42,36,0.1); border-radius:16px; padding:14px 30px; box-shadow:0 16px 32px -24px rgba(46,42,36,0.4);\">\n          <sc-for list=\"{{ status }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; align-items:center; gap:18px; padding:20px 0; border-bottom:1px solid {{ s.border }};\">\n              <span style=\"flex:0 0 120px; font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:1px; font-size:15px; color:#0E8C9C;\">{{ s.label }}<\u002Fspan>\n              <span style=\"display:flex; align-items:center; gap:10px; font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2E2A24;\">\n                <sc-if value=\"{{ s.dot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:11px; height:11px; border-radius:50%; background:#3f8a5b;\"><\u002Fspan><\u002Fsc-if>\n                {{ s.value }}\n              <\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#2b2620; padding:64px 28px 40px; position:relative; margin-top:30px;\">\n    <div style=\"max-width:1180px; margin:0 auto; text-align:center;\">\n      <div style=\"font-family:'Architects Daughter',cursive; font-size:32px; color:#0E8C9C;\">&amp; that's a wrap!<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:44px; letter-spacing:-1px; color:#F4EFE3; margin:6px 0 36px;\">GLAD YOU MADE IT HERE.<\u002Fh2>\n      <div style=\"font-family:'Architects Daughter',cursive; font-size:26px; color:#b7ad9c; margin-bottom:18px;\">You can connect with me on,<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:14px 30px; justify-content:center; align-items:center; margin-bottom:50px;\">\n        <sc-for list=\"{{ socials }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <a href=\"{{ s.url }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:6px; font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:1px; font-size:22px; color:{{ s.color }}; text-decoration:none; transition:transform .3s cubic-bezier(0.34,1.56,0.64,1);\" style-hover=\"transform:translateY(-4px);\">{{ s.label }} ↗<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:20px; align-items:center; justify-content:space-between; border-top:1px solid rgba(244,239,227,0.14); padding-top:24px;\">\n        <div style=\"font-family:'Architects Daughter',cursive; font-size:24px; color:#b7ad9c; display:flex; align-items:center; gap:10px;\">Built with care and a lot of passion! <span style=\"color:#0E8C9C;\">❤<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'DM Sans',sans-serif; font-variant-numeric:tabular-nums; font-size:15px; color:#8a8170; letter-spacing:1px;\">{{ clockTime }} &nbsp;|&nbsp; {{ dateLong }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <button id=\"go-top\" onclick=\"{{ scrollTop }}\" aria-label=\"Back to top\" style=\"position:fixed; right:26px; bottom:26px; z-index:60; width:108px; height:108px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transform:translateY(14px); pointer-events:none; transition:opacity .4s ease, transform .4s cubic-bezier(0.34,1.56,0.64,1);\" style-hover=\"transform:translateY(-4px);\">\n    <svg viewBox=\"0 0 108 108\" width=\"108\" height=\"108\" style=\"position:absolute; inset:0; animation:spin 11s linear infinite;\">\n      <defs><path id=\"gtt-path\" d=\"M54,54 m-40,0 a40,40 0 1,1 80,0 a40,40 0 1,1 -80,0\"><\u002Fpath><\u002Fdefs>\n      <text fill=\"#2E2A24\" style=\"font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:700; letter-spacing:3.5px;\"><textPath href=\"#gtt-path\" startOffset=\"0\">GO TO TOP&nbsp;&nbsp;◆&nbsp;&nbsp;GO TO TOP&nbsp;&nbsp;◆&nbsp;&nbsp;<\u002FtextPath><\u002Ftext>\n    <\u002Fsvg>\n    <span style=\"position:absolute; width:66px; height:66px; border:1.6px dashed rgba(46,42,36,0.55); border-radius:50%;\"><\u002Fspan>\n    <span style=\"position:relative; color:#0E8C9C; font-size:30px; line-height:1; font-weight:700;\">↑<\u002Fspan>\n  <\u002Fbutton>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { now: new Date() };\n  componentDidMount() {\n    this._reduced = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);\n    this._tick = setInterval(() => this.setState({ now: new Date() }), 1000);\n    setTimeout(() => this.initHeader(), 30);\n  }\n  componentWillUnmount() { clearInterval(this._tick); }\n  pad(n) { return (n < 10 ? '0' : '') + n; }\n  scrollTop = () => window.scrollTo({ top: 0, behavior: this._reduced ? 'auto' : 'smooth' });\n  initHeader() {\n    const h = document.getElementById('site-header');\n    const logo = document.getElementById('hj-logo');\n    if (!h) return;\n    const onScroll = () => {\n      const s = window.scrollY > 40;\n      h.style.paddingTop = s ? '10px' : '16px';\n      const card = document.getElementById('header-card');\n      if (card) {\n        card.style.paddingTop = s ? '9px' : '13px';\n        card.style.paddingBottom = s ? '9px' : '13px';\n        card.style.boxShadow = s ? '0 16px 36px -16px rgba(46,42,36,0.45)' : '0 10px 30px -18px rgba(46,42,36,0.35)';\n      }\n      if (logo) logo.style.fontSize = s ? '25px' : '28px';\n      const gt = document.getElementById('go-top');\n      if (gt) {\n        const show = window.scrollY > 320;\n        gt.style.opacity = show ? '1' : '0';\n        gt.style.transform = show ? 'translateY(0)' : 'translateY(14px)';\n        gt.style.pointerEvents = show ? 'auto' : 'none';\n      }\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n  }\n\n  sendMessage = () => {\n    const name = (document.getElementById('c-name') || {}).value || '';\n    const email = (document.getElementById('c-email') || {}).value || '';\n    const topicEl = document.getElementById('c-topic');\n    const topic = topicEl ? topicEl.options[topicEl.selectedIndex].text : '';\n    const msg = (document.getElementById('c-msg') || {}).value || '';\n    const subject = encodeURIComponent('Portfolio enquiry' + (topic && topic !== 'Select...' ? ' — ' + topic : ''));\n    const body = encodeURIComponent('Name: ' + name + '\\nEmail: ' + email + '\\n\\n' + msg);\n    window.location.href = 'mailto:himanshijain053@gmail.com?subject=' + subject + '&body=' + body;\n  };\n\n  renderVals() {\n    const main = 'index.html';\n    const nav = [\n      { label: 'Work', href: 'work.html', line: '0%' },\n      { label: 'About', href: 'about.html', line: '0%' },\n      { label: 'Resume', href: 'resume.html', line: '0%' },\n      { label: 'Contact', href: 'contact.html', line: '100%' }\n    ];\n\n    const topics = [\n      { value: '', label: 'Select...' },\n      { value: 'project', label: 'A product / UX project' },\n      { value: 'collab', label: 'Collaboration or contract' },\n      { value: 'fulltime', label: 'Full-time opportunity' },\n      { value: 'speaking', label: 'Speaking / mentoring' },\n      { value: 'other', label: 'Something else' }\n    ];\n\n    const status = [\n      { label: 'STATUS', value: 'Open to work', dot: true, border: 'rgba(46,42,36,0.12)' },\n      { label: 'BASED IN', value: 'Gurugram', dot: false, border: 'rgba(46,42,36,0.12)' },\n      { label: 'TIME ZONE', value: 'IST \\u00b7 UTC +5:30', dot: false, border: 'transparent' }\n    ];\n\n    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];\n    const n = this.state.now;\n    const clockTime = this.pad(n.getHours()) + ':' + this.pad(n.getMinutes()) + ':' + this.pad(n.getSeconds());\n    const dateLong = days[n.getDay()] + ', ' + months[n.getMonth()] + ' ' + n.getDate() + ', ' + n.getFullYear();\n    const socials = [\n      { label: 'LINKEDIN', url: 'https://www.linkedin.com/in/himanshijain', color: '#5b86e6' },\n      { label: 'INSTAGRAM', url: 'https://www.instagram.com/himanshijain', color: '#D6336C' },\n      { label: 'BEHANCE', url: 'https://www.behance.net/himanshijain', color: '#3B6FE0' },\n      { label: 'WHATSAPP', url: 'https://wa.me/917014744297', color: '#62C554' }\n    ];\n\n    return { nav, topics, status, sendMessage: this.sendMessage, socials, clockTime, dateLong, scrollTop: this.scrollTop };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
